{% extends 'portal/base_admin.html' %}

{% block content %}
<div class="glass-panel p-5 border-secondary text-center" style="max-width: 500px; margin: 2rem auto;">
    <i class="bi bi-exclamation-triangle text-danger fs-1 mb-3 d-block"></i>
    <h3 class="font-heading text-white mb-2">Delete Deal?</h3>
    <p class="text-muted mb-4">Remove <strong class="text-white">{{ deal.title }}</strong>? Products will not be deleted.</p>
    <form method="post" class="d-flex gap-2 justify-content-center">
        {% csrf_token %}
        <a href="{% url 'portal:deal_list' %}" class="btn btn-outline-secondary font-subheading">Cancel</a>
        <button type="submit" class="btn btn-danger font-subheading">Delete Deal</button>
    </form>
</div>
{% endblock %}
