{% extends 'portal/base_admin.html' %}

{% block content %}
<div class="d-flex align-items-center justify-content-between mb-4 pb-3 border-bottom border-secondary">
    <h2 class="font-heading text-white fw-bold mb-0">Edit Review</h2>
    <a href="{% url 'portal:review_list' %}" class="btn btn-outline-secondary font-subheading">Back</a>
</div>

<div class="glass-panel p-4 border-secondary" style="max-width: 700px;">
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label text-secondary font-subheading">Product</label>
            {{ form.product }}
        </div>
        <div class="mb-3">
            <label class="form-label text-secondary font-subheading">Author Name</label>
            {{ form.author_name }}
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label text-secondary font-subheading">Rating (1-5)</label>
                {{ form.rating }}
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label text-secondary font-subheading">Category</label>
                {{ form.category }}
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label text-secondary font-subheading">Source / Origin</label>
                {{ form.source }}
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label text-secondary font-subheading">Title</label>
                {{ form.title }}
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label text-secondary font-subheading">Content</label>
            {{ form.content }}
        </div>
        <div class="form-check mb-4">
            {{ form.is_approved }}
            <label class="form-check-label text-white font-subheading">Approved</label>
        </div>
        <button type="submit" class="btn btn-cyber btn-cyber-purple font-subheading">Save Review</button>
    </form>
</div>
{% endblock %}
