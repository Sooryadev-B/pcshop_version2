{% extends 'portal/base_admin.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="glass-panel p-4 border-secondary text-center">
            <h3 class="font-heading text-white mb-2">Delete Feedback?</h3>
            <p class="text-muted font-subheading mb-4">Remove feedback from <strong class="text-white">{{ feedback.name }}</strong>: "{{ feedback.subject }}"?</p>
            <form method="post" class="d-flex gap-2 justify-content-center">
                {% csrf_token %}
                <a href="{% url 'portal:feedback_list' %}" class="btn btn-outline-secondary font-subheading">Cancel</a>
                <button type="submit" class="btn btn-danger font-subheading">Delete</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
